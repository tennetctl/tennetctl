title: "SQL Migrator — Incremental Schema Migration Runner"
feature: "01_sql_migrator"
db_schema: "00_schema_migrations"
status: ACTIVE
owner: "srigaddeks"
created_at: "2026-04-08"
description: |
  The SQL migrator is tennetctl's built-in schema migration runner.
  It discovers all *.sql files across every feature's 02_in_progress/ directory,
  applies them in global NNN sequence order, and tracks each applied migration in
  a dedicated Postgres schema (00_schema_migrations). Fully idempotent — safe to
  run on every deploy. Replaces ad-hoc psql invocations and external tools like
  Flyway or Alembic.

sub_features:
  - number: 0
    name: bootstrap
    status: BUILDING
    description: "Bootstrap the 00_schema_migrations schema and the migrations tracking table."
  - number: 1
    name: runner
    status: BUILDING
    description: "The migration runner: discover, order, apply, and track SQL files."

migrations: []
