description: |
  The Python migration runner (scripts/migrate.py). Reads migration.yaml files,
  builds a globally ordered migration list, diffs against applied_migrations,
  and applies new SQL files incrementally. Supports up, down, status, and
  validate commands. Safe for CI/CD pipelines.
