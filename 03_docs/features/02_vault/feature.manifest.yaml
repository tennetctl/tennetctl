title: "T-Vault — Encrypted Secrets Management"
feature: "02_vault"
db_schema: "02_vault"
status: ACTIVE
owner: "srigaddeks"
created_at: "2026-04-08"
description: |
  T-Vault is tennetctl's built-in secrets manager. Secrets, environment variables,
  and configs live in Postgres — encrypted at rest. No .env files. No external
  secret manager required. The vault supports pluggable unseal backends: manual
  (operator provides Root Unseal Key on every boot) for local dev and single-VM
  deployments, and cloud KMS backends (Azure Key Vault, AWS KMS, GCP KMS) for
  K8s-native auto-unseal via workload identity.

