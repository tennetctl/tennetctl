title: "T-Vault — Azure Key Vault Auto-Unseal"
sub_feature: "02_kms_azure"
feature: "02_vault"
status: BUILDING
owner: "srigaddeks"
created_at: "2026-04-08"
description: |
  Azure Key Vault auto-unseal backend. Wraps the MDK with an Azure Key Vault
  wrapping key at install time; pods call unwrapKey on every boot using
  Workload Identity (AKS) or DefaultAzureCredential (local/CI). Implements
  the UnsealBackend protocol defined in 01_setup. No schema changes — all
  metadata lives in 10_fct_vault.unseal_config.
